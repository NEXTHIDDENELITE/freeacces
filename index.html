<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVER OFFLINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&family=Noto+Sans:wght@500;700&family=Cairo:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --danger: #ff0055;
            --warning: #ffcc00;
            --discord: #5865F2;
            --bg-dark: #040406;
            --card-bg: rgba(10, 10, 14, 0.75);
            --neon-blue: #00f0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ইন্টারফেসের বাটন ছাড়া টেক্সট কপি করার জন্য এলাউ করা হয়েছে */
        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a0510 0%, var(--bg-dark) 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', 'Noto Sans', sans-serif;
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
            position: relative;
            user-select: text; /* কপি করার সুবিধা */
            -webkit-user-select: text;
        }

        /* বাটন বা আইকন যেন টেক্সট সিলেকশনের ঝামেলা না করে */
        .status-header, .track-btn, .lang-select, .tts-btn, .nav-link, .modal-close {
            user-select: none;
            -webkit-user-select: none;
        }

        /* পার্টিকল অ্যানিমেশন ব্যাকগ্রাউন্ড */
        .bg-glows {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glows span {
            position: absolute;
            background: var(--danger);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: floatGlow 8s infinite alternate ease-in-out;
        }
        .bg-glows span:nth-child(1) { width: 300px; height: 300px; top: 10%; left: 10%; animation-delay: 0s; }
        .bg-glows span:nth-child(2) { width: 250px; height: 250px; bottom: 15%; right: 10%; background: var(--neon-blue); animation-delay: -3s; }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        /* মেইন কন্টেইনার */
        .status-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 85, 0.2);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.02);
            z-index: 1;
            animation: cardAppear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* টপ মিনি লিংকের সেকশন */
        .top-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .nav-link {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #888892;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        }

        /* সার্ভার অফলাইন হেডার */
        .status-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--danger);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
            margin-bottom: 18px;
        }

        .dot {
            width: 9px;
            height: 9px;
            background: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* কন্ট্রোল বার (ল্যাঙ্গুয়েজ ও মাইক) */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* স্পিকার অ্যানিমেশন আইকন */
        .tts-btn {
            background: none;
            border: none;
            color: #8aa;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .tts-btn:hover {
            color: var(--warning);
            background: rgba(255, 204, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }
        .tts-btn.speaking {
            color: var(--neon-blue);
            animation: speakPulse 1s infinite alternate;
            background: rgba(0, 240, 255, 0.1);
        }
        @keyframes speakPulse {
            0% { transform: scale(1); box-shadow: 0 0 4px var(--neon-blue); }
            100% { transform: scale(1.15); box-shadow: 0 0 15px var(--neon-blue); }
        }

        .lang-select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        /* নোটিশ বক্স */
        .notice-box {
            background: rgba(255, 0, 85, 0.02);
            border: 1px dashed rgba(255, 0, 85, 0.2);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            text-align: left;
            min-height: 115px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .notice-box.rtl {
            text-align: right;
            font-family: 'Cairo', sans-serif;
        }

        .notice-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--warning);
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 1px;
        }
        .notice-box.rtl .notice-title { flex-direction: row-reverse; }

        .notice-desc {
            font-size: 13.5px;
            color: #d1d1d6;
            line-height: 1.5;
            font-weight: 500;
        }

        /* ডিসকর্ড বাটন */
        .track-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5865F2, #404eed);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }

        .track-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(88, 101, 242, 0.5);
            background: linear-gradient(135deg, #6a77f3, #4d5af1);
        }

        /* পপআপ মডাল স্টাইল */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 5, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #0f0f16;
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 22px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            transform: scale(0.9);
            transition: all 0.3s ease;
            text-align: left;
        }
        .modal.active .modal-content { transform: scale(1); }
        .modal-h {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-p { 
            font-size: 13.5px; 
            color: #b5b5bc; 
            line-height: 1.6; 
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        .modal-close {
            background: rgba(255,255,255,0.05);
            border: none; color: white;
            padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-size: 12px;
            font-family: 'Orbitron'; width: 100%;
            transition: 0.2s;
        }
        .modal-close:hover { background: var(--danger); }
    </style>
</head>
<body>

    <div class="bg-glows">
        <span></span>
        <span></span>
    </div>

    <div class="status-container">
        
        <div class="top-nav">
            <div class="nav-link" onclick="openModal('privacy')"><i class="fas fa-shield-alt"></i> Privacy</div>
            <div class="nav-link" onclick="openModal('security')"><i class="fas fa-sync-alt"></i> Updates</div>
        </div>

        <div class="status-header">
            <div class="dot"></div>
            SERVER OFFLINE
        </div>

        <div class="control-bar">
            <button class="tts-btn" id="ttsBtn" onclick="toggleSpeak()" title="Listen Notice">
                <i class="fas fa-microphone-alt"></i>
            </button>
            <select class="lang-select" id="langSelect" onchange="changeLanguage()">
                <option value="en" selected>English</option>
                <option value="bn">বাংলা</option>
                <option value="hi">हिन्दी</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <div class="notice-box" id="noticeBox">
            <div class="notice-title" id="noticeTitle">
                <i class="fas fa-tools"></i> MAINTENANCE NOTICE
            </div>
            <div class="notice-desc" id="noticeDesc">
                Our main server is temporarily offline for database updates and security patching. The server will be fully live as soon as the update is complete. Thank you for your patience.
            </div>
        </div>

        <a href="https://discord.gg/hEMSEcgwZ" target="_blank" class="track-btn">
            <i class="fab fa-discord"></i> TRACK LIVE STATUS
        </a>

    </div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <div class="modal-h" id="modalHeading"></div>
            <div class="modal-p" id="modalText"></div>
            <button class="modal-close" onclick="closeModal()">CLOSE PANEL</button>
        </div>
    </div>

    <script>
        // বিভিন্ন ভাষার নোটিশ ডাটাবেস
        const languageData = {
            en: {
                title: '<i class="fas fa-tools"></i> MAINTENANCE NOTICE',
                desc: 'Our main server is temporarily offline for database updates and security patching. The server will be fully live as soon as the update is complete. Thank you for your patience.',
                langCode: 'en-US',
                rtl: false
            },
            bn: {
                title: '<i class="fas fa-tools"></i> মেইনটেন্যান্স নোটিশ',
                desc: 'আমাদের মেইন সার্ভার ডাটাবেস আপডেট এবং সিকিউরিটি প্যাচিংয়ের জন্য সাময়িকভাবে বন্ধ রাখা হয়েছে। আপডেট শেষ হওয়া মাত্রই সার্ভার পুনরায় লাইভ করে দেওয়া হবে। ধন্যবাদ।',
                langCode: 'bn-BD',
                rtl: false
            },
            hi: {
                title: '<i class="fas fa-tools"></i> रखरखाव सूचना',
                desc: 'डेटाबेस अपडेट और सुरक्षा पैचिंग के लिए हमारा मुख्य सर्वर अस्थायी रूप से ऑफलाइन है। अपडेट पूरा होते ही सर्वर को फिर से लाइव कर दिया जाएगा। धन्यवाद।',
                langCode: 'hi-IN',
                rtl: false
            },
            ar: {
                title: '<i class="fas fa-tools"></i> إشعار الصيانة',
                desc: 'خادمنا الرئيسي غير متصل بالإنترنت حاليًا لإجراء تحديثات على قاعدة البيانات وإصلاحات الأمان. سيعود الخادم للعمل فور اكتمال التحديث. شكرًا لكم على صبركم.',
                langCode: 'ar-SA',
                rtl: true
            }
        };

        // টপ ট্যাব ডাটাবেস (কপিযোগ্য টেক্সট)
        const infoData = {
            privacy: {
                title: '<i class="fas fa-shield-alt"></i> Privacy Policy',
                text: 'We take security seriously. During system operations, your system keys and session UIDs are heavily encrypted via advanced cryptographic tokens. No personal logs or identifiers are stored permanently on our backend routing layers.'
            },
            security: {
                title: '<i class="fas fa-sync-alt"></i> Security & Updates',
                text: 'V3.2 Patch Log: Integrated custom bypass architecture, updated automated dynamic tokens, and patched server-side data leaks. Current build is securely locked until the primary cloud database re-establishes connectivity.'
            }
        };

        let currentSynth = window.speechSynthesis;
        let currentUtterance = null;
        let voicesList = [];

        // ব্রাউজারে অ্যাভেলেবল ভয়েস লোড করার ফিক্স
        function loadVoices() {
            if (currentSynth) {
                voicesList = currentSynth.getVoices();
            }
        }
        loadVoices();
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function changeLanguage() {
            stopSpeaking();
            
            const selectedLang = document.getElementById('langSelect').value;
            const noticeBox = document.getElementById('noticeBox');
            const noticeTitle = document.getElementById('noticeTitle');
            const noticeDesc = document.getElementById('noticeDesc');

            noticeTitle.innerHTML = languageData[selectedLang].title;
            noticeDesc.innerText = languageData[selectedLang].desc;

            if (languageData[selectedLang].rtl) {
                noticeBox.classList.add('rtl');
            } else {
                noticeBox.classList.remove('rtl');
            }
        }

        // মাল্টি-ল্যাঙ্গুয়েজ স্পিচ ফিক্স ইঞ্জিন
        function toggleSpeak() {
            const btn = document.getElementById('ttsBtn');
            
            if (btn.classList.contains('speaking')) {
                stopSpeaking();
            } else {
                const selectedLang = document.getElementById('langSelect').value;
                const textToSpeak = languageData[selectedLang].desc;
                const targetLangCode = languageData[selectedLang].langCode;
                
                currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
                currentUtterance.lang = targetLangCode;
                
                // বাংলা এবং আরবি ভয়েস ম্যাচিং ফিক্স
                if (voicesList.length > 0) {
                    const matchedVoice = voicesList.find(voice => voice.lang.startsWith(targetLangCode.split('-')[0]));
                    if (matchedVoice) {
                        currentUtterance.voice = matchedVoice;
                    }
                }
                
                currentUtterance.rate = 0.90; // কথা বলার স্পিড কিছুটা স্বাভাবিক রাখা হয়েছে

                currentUtterance.onend = function() { stopSpeaking(); };
                currentUtterance.onerror = function() { stopSpeaking(); };

                btn.classList.add('speaking');
                currentSynth.speak(currentUtterance);
            }
        }

        function stopSpeaking() {
            if (currentSynth) {
                currentSynth.cancel();
            }
            document.getElementById('ttsBtn').classList.remove('speaking');
        }

        // মডাল পপআপ কন্ট্রোল
        function openModal(type) {
            document.getElementById('modalHeading').innerHTML = infoData[type].title;
            document.getElementById('modalText').innerText = infoData[type].text;
            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('infoModal').classList.remove('active');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
